<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景圆角矩形 -->
  <rect width="1024" height="1024" rx="225" fill="#6366f1"/>
  
  <!-- 高光 -->
  <rect x="0" y="0" width="1024" height="512" rx="225" fill="#818cf8" opacity="0.5"/>
  
  <!-- M字母 -->
  <text x="512" y="620" font-family="Helvetica, Arial, sans-serif" font-weight="700"
